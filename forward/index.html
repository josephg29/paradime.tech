<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>paradime.technologies</title>
  <style>
    @font-face {
      font-family: 'Monocraft';
      src: url('../fonts/Monocraft.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Monocraft', 'Courier New', monospace;
      background: #fff;
      color: #111;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: unset;
    }

    .quote {
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      line-height: 2;
      max-width: 480px;
    }

    .attr {
      display: block;
      margin-top: 1.2rem;
      color: #999;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>

  <div class="quote">
    "The higher we soar, the smaller we appear to those who cannot fly."
    <span class="attr">— Nietzsche</span>
  </div>

</body>
</html>
